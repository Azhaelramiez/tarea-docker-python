name: validate-bake

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  bake:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Validate Bake definition
        uses: docker/bake-action@v6
        with:
          files: docker-bake.hcl
          targets: validate
          push: false
          load: true